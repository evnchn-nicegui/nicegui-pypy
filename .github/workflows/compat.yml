name: compat

on:
  schedule:
    - cron: '0 6 * * *'   # daily 06:00 UTC
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - 'README.md'
      - 'badge.json'

# Only the report job writes back to the repo.
permissions:
  contents: read

concurrency:
  group: compat
  cancel-in-progress: false

jobs:
  test:
    name: ${{ matrix.pypy }} · ${{ matrix.source }}
    runs-on: ubuntu-latest
    timeout-minutes: 75
    strategy:
      fail-fast: false
      matrix:
        # '3.11' (bare) is the CPython 3.11 control — same harness, so its counts
        # separate PyPy-specific failures from harness/ordering artifacts.
        pypy: ['pypy3.10', 'pypy3.11', '3.11']
        source: ['pypi', 'main']
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - name: System build deps (for source-only PyPy wheels)
        # lxml/aiohttp/httptools have no PyPy wheels on some versions and build
        # from source; these headers let that build succeed on the runner.
        run: sudo apt-get update && sudo apt-get install -y libxml2-dev libxslt1-dev
      - name: Probe (${{ matrix.pypy }} · ${{ matrix.source }})
        run: |
          python3 run_compat.py \
            --pypy "${{ matrix.pypy }}" \
            --source "${{ matrix.source }}" \
            --out "results/${{ matrix.pypy }}-${{ matrix.source }}.json"
      - uses: actions/upload-artifact@v4
        with:
          name: result-${{ matrix.pypy }}-${{ matrix.source }}
          path: results/*.json
          if-no-files-found: error

  report:
    name: render + commit matrix
    needs: test
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: result-*
          merge-multiple: true
      - name: Render report
        run: python3 render_report.py --in artifacts --readme README.md --badge badge.json
      - name: Commit updated matrix
        run: |
          git config user.name  'nicegui-pypy-bot'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add README.md badge.json
          if git diff --cached --quiet; then
            echo 'no changes'; exit 0
          fi
          git commit -m 'compat: update matrix [skip ci]'
          # main may have advanced during the long matrix run — rebase + retry
          # so the update is never lost to a non-fast-forward rejection.
          for attempt in 1 2 3; do
            if git pull --rebase --autostash origin main && git push; then
              echo "pushed on attempt $attempt"; exit 0
            fi
            echo "push attempt $attempt failed; retrying"; sleep 5
          done
          echo 'push failed after 3 attempts'; exit 1
